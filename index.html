<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Akhildev MJ | Full Stack Developer Portfolio</title>
    <meta name="title" content="Akhildev MJ | Full Stack Developer Portfolio" />
    <meta
      name="description"
      content="Akhildev MJ - Full Stack Developer specializing in React, TypeScript, and modern web technologies. Explore projects, skills, and certifications."
    />
    <meta
      name="keywords"
      content="Akhildev MJ, Full Stack Developer, React Developer, TypeScript, Portfolio, Web Developer India"
    />
    <meta name="author" content="Akhildev MJ" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://akhildev.vercel.app" />

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Akhildev MJ | Full Stack Developer Portfolio"
    />
    <meta
      property="og:description"
      content="Explore projects, certifications, and skills of Akhildev MJ."
    />
    <meta property="og:url" content="https://akhildev.vercel.app" />
    <meta property="og:site_name" content="Akhildev Portfolio" />
    <meta
      property="og:image"
      content="https://akhildev.vercel.app/og-image.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Akhildev MJ | Full Stack Developer Portfolio"
    />
    <meta
      name="twitter:description"
      content="Modern portfolio showcasing projects and skills."
    />
    <meta
      name="twitter:image"
      content="https://akhildev.vercel.app/og-image.png"
    />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="modulepreload" href="/src/main.tsx" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Akhildev MJ",
        "url": "https://akhildev.vercel.app",
        "image": "https://akhildev.vercel.app/profile.jpg",
        "sameAs": [
          "https://github.com/akhildev-mj",
          "https://linkedin.com/in/akhildevmj"
        ],
        "jobTitle": "Full Stack Developer"
      }
    </script>
  </head>

  <body>
    <!-- SEO fallback for no-JS -->
    <noscript>
      <h1>Akhildev MJ - Full Stack Developer</h1>
      <p>
        Portfolio showcasing projects, skills, and certifications built with
        React, TypeScript, and modern web technologies.
      </p>
    </noscript>

    <!-- App Root -->
    <div id="root"></div>

    <!-- Main Script -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

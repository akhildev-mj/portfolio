<!doctype html>
<html lang="en">
	<head>
		<!-- Basic -->
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Primary SEO -->
		<title>Akhildev MJ</title>
		<meta name="title" content="Akhildev MJ" />
		<meta
			name="description"
			content="Akhildev MJ - Full Stack Developer specializing in React, TypeScript, and modern web technologies. Explore projects, skills, and certifications." />
		<meta
			name="keywords"
			content="Akhildev MJ, Full Stack Developer, React Developer, TypeScript, Portfolio, Web Developer" />
		<meta name="author" content="Akhildev MJ" />
		<meta name="robots" content="index, follow, max-image-preview:large" />
		<meta name="googlebot" content="index, follow" />

		<!-- Canonical -->
		<link rel="canonical" href="https://akhildev.vercel.app" />

		<!-- Theme -->
		<meta name="theme-color" content="#000000" />
		<meta name="format-detection" content="telephone=no" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Akhildev MJ" />
		<meta
			property="og:description"
			content="Explore projects, certifications, and skills of Akhildev MJ." />
		<meta property="og:url" content="https://akhildev.vercel.app" />
		<meta property="og:site_name" content="Akhildev MJ" />
		<meta
			property="og:image"
			content="https://akhildev.vercel.app/og-image.png" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Akhildev MJ" />
		<meta
			name="twitter:description"
			content="Explore projects, certifications, and skills of Akhildev MJ." />
		<meta
			name="twitter:image"
			content="https://akhildev.vercel.app/og-image.png" />

		<!-- Favicons -->
		<link rel="icon" type="image/png" href="/favicon.png" />
		<link rel="shortcut icon" href="/favicon.png" />
		<link rel="apple-touch-icon" href="/favicon.png" />

		<!-- Manifest -->
		<link rel="manifest" href="/site.webmanifest" />

		<script>
			(function () {
				try {
					var storedTheme = localStorage.getItem('theme');
					var isDark =
						storedTheme === 'dark' ||
						(!storedTheme &&
							window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (isDark) {
						document.documentElement.classList.add('dark');
						document.documentElement.style.backgroundColor = '#0a0a0a';
					} else {
						document.documentElement.classList.remove('dark');
						document.documentElement.style.backgroundColor = '#fafafa';
					}
				} catch (e) {}
			})();
		</script>
	</head>

	<body
		class="bg-[#fafafa] text-gray-900 dark:bg-[#0a0a0a] dark:text-gray-100 antialiased">
		<!-- App Root -->
		<div id="root"></div>

		<!-- Main Script -->
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
